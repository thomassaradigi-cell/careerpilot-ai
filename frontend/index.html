<!DOCTYPE html>
<html>
<head>
<title>CareerPilot AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

input{
padding:10px;
margin:10px;
width:220px;
}

button{
padding:10px 20px;
background:#0077ff;
color:white;
border:none;
cursor:pointer;
}

pre{
background:white;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>🚀 CareerPilot AI</h1>
<p>AI Job Automation Tool</p>

<br>

<input id="role" placeholder="Enter Job Role">

<br>

<input id="location" placeholder="Enter Location">

<br>

<button onclick="runAI()">Run AI</button>

<pre id="result"></pre>

<script>

async function runAI(){

const role = document.getElementById("role").value;
const location = document.getElementById("location").value;

document.getElementById("result").innerText = "Running AI...";

const response = await fetch("/run-ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
role:role,
location:location
})
});

const data = await response.text();

document.getElementById("result").innerText = data;

}

</script>

</body>
</html>
